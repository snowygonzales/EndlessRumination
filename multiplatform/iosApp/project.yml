    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.endlessrumination.EndlessRumination
        INFOPLIST_FILE: iosApp/Info.plist
        MARKETING_VERSION: "0.3.0"
        CURRENT_PROJECT_VERSION: "7"
        INFOPLIST_KEY_CFBundleDisplayName: "Endless Rumination"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        OTHER_LINKER_FLAGS: "-ObjC"
      configs:
        Debug:
          FRAMEWORK_SEARCH_PATHS:
            - "$(SRCROOT)/../shared/build/bin/iosSimulatorArm64/debugFramework"
        Release:
          FRAMEWORK_SEARCH_PATHS:
            - "$(SRCROOT)/../shared/build/bin/iosArm64/releaseFramework"
    dependencies:
      - framework: "../shared/build/bin/iosSimulatorArm64/debugFramework/Shared.framework"
        embed: false
      - package: GoogleMobileAds
        product: GoogleMobileAds
    preBuildScripts:
      - name: "Build Shared KMP Framework"
        script: |
          cd "$SRCROOT/.."
          export JAVA_HOME="/opt/homebrew/opt/openjdk@17/libexec/openjdk.jdk/Contents/Home"
          if [ "$CONFIGURATION" = "Release" ]; then
            ./gradlew :shared:linkReleaseFrameworkIosArm64
          else
            ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64
          fi
        basedOnDependencyAnalysis: false
schemes:
  iosApp:
    build:
      targets:
        iosApp: all
    run:
      config: Debug
    archive:
      config: Release
