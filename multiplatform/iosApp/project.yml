name: iosApp
options:
  bundleIdPrefix: com.endlessrumination
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: R6N5B4SDWH
targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
    info:
      path: iosApp/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleIconName: AppIcon
        CADisableMinimumFrameDurationOnPhone: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.endlessrumination.EndlessRumination
        INFOPLIST_FILE: iosApp/Info.plist
        MARKETING_VERSION: "0.2.0"
        CURRENT_PROJECT_VERSION: "6"
        INFOPLIST_KEY_CFBundleDisplayName: "Endless Rumination"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        OTHER_LINKER_FLAGS: "-ObjC"
      configs:
        Debug:
          FRAMEWORK_SEARCH_PATHS:
            - "$(SRCROOT)/../shared/build/bin/iosSimulatorArm64/debugFramework"
        Release:
          FRAMEWORK_SEARCH_PATHS:
            - "$(SRCROOT)/../shared/build/bin/iosArm64/releaseFramework"
    dependencies:
      - framework: "../shared/build/bin/iosSimulatorArm64/debugFramework/Shared.framework"
        embed: false
    preBuildScripts:
      - name: "Build Shared KMP Framework"
        script: |
          cd "$SRCROOT/.."
          export JAVA_HOME="/opt/homebrew/opt/openjdk@17/libexec/openjdk.jdk/Contents/Home"
          if [ "$CONFIGURATION" = "Release" ]; then
            ./gradlew :shared:linkReleaseFrameworkIosArm64
          else
            ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64
          fi
        basedOnDependencyAnalysis: false
schemes:
  iosApp:
    build:
      targets:
        iosApp: all
    run:
      config: Debug
    archive:
      config: Release
