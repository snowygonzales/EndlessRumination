name: EndlessRumination
options:
  bundleIdPrefix: com.endlessrumination
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
packages:
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    branch: main
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: R6N5B4SDWH
targets:
  EndlessRumination:
    type: application
    platform: iOS
    sources:
      - EndlessRumination
    entitlements:
      path: EndlessRumination/EndlessRumination.entitlements
      properties:
        com.apple.developer.kernel.increased-memory-limit: true
    info:
      path: EndlessRumination/Info.plist
      properties:
        CFBundleDisplayName: "Endless Rumination"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleIconName: AppIcon
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.endlessrumination.EndlessRumination
        INFOPLIST_FILE: EndlessRumination/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "29"
        INFOPLIST_KEY_CFBundleDisplayName: "Endless Rumination"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
  EndlessRuminationTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - EndlessRuminationTests
    settings:
      GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: EndlessRumination
schemes:
  EndlessRumination:
    build:
      targets:
        EndlessRumination: all
        EndlessRuminationTests: [test]
    run:
      config: Debug
      storeKitConfiguration: EndlessRumination/EndlessRumination.storekit
    test:
      config: Debug
      storeKitConfiguration: EndlessRumination/EndlessRumination.storekit
      targets:
        - EndlessRuminationTests
    archive:
      config: Release
