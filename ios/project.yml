name: EndlessRumination
options:
  bundleIdPrefix: com.endlessrumination
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    exactVersion: 11.13.0
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    branch: main
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: R6N5B4SDWH
targets:
  EndlessRumination:
    type: application
    platform: iOS
    sources:
      - EndlessRumination
    entitlements:
      path: EndlessRumination/EndlessRumination.entitlements
    info:
      path: EndlessRumination/Info.plist
      properties:
        CFBundleDisplayName: "Endless Rumination"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleIconName: AppIcon
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSUserTrackingUsageDescription: "This allows us to show you relevant ads and support the free tier of the app."
