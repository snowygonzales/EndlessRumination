        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "21"
        INFOPLIST_KEY_CFBundleDisplayName: "Endless Rumination"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        OTHER_LINKER_FLAGS: "-ObjC"
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
  EndlessRuminationTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - EndlessRuminationTests
    settings:
      GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: EndlessRumination
schemes:
  EndlessRumination:
    build:
      targets:
        EndlessRumination: all
        EndlessRuminationTests: [test]
    run:
      config: Debug
      storeKitConfiguration: EndlessRumination/EndlessRumination.storekit
    test:
      config: Debug
      storeKitConfiguration: EndlessRumination/EndlessRumination.storekit
      targets:
        - EndlessRuminationTests
    archive:
      config: Release
